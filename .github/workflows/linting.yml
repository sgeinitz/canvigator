name: Python linting and tests

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install flake8
        pip install flake8-docstrings
    - name: Check syntax errors
      run: flake8 $(git ls-files '*.py') --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Check style and docstrings
      run: flake8 $(git ls-files '*.py') --count --max-complexity=15 --max-line-length=160 --ignore=D100,D205,D210,D400,D401,W504,E111,E402 --statistics

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    - name: Run tests
      run: python -m pytest test_canvigator.py -v
